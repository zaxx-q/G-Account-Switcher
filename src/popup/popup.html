<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>G-Account Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">G-Account Switcher</h1>
      <div class="toggle-wrap">
        <label class="toggle" for="enableToggle">
          <input type="checkbox" id="enableToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <!-- Current Site — icon-based account selector -->
    <div class="section" id="currentSiteSection" style="display:none">
      <div class="current-site-panel">
        <div class="current-site-header">
          <span class="site-icon">🌐</span>
          <span class="current-site-name" id="currentSiteName">Current Site</span>
        </div>
        <div class="site-account-icons" id="siteAccountIcons">
          <!-- Populated by JS -->
        </div>
        <div class="current-site-status" id="currentSiteStatus"></div>
      </div>
    </div>

    <!-- Site Settings -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Site Settings</span>
        <button class="btn btn-sm" id="addSiteSettingBtn" title="Add site setting">+ Add</button>
      </div>
      <div id="siteSettingList" class="site-setting-list">
        <div class="empty-state" id="siteSettingEmpty">
          <span>No sites configured yet.</span>
          <span class="hint">Use the panel above to assign accounts to sites, or click <b>+ Add</b>.</span>
        </div>
      </div>
    </div>

    <!-- Add Site Setting Form (hidden) -->
    <div id="addSiteSettingForm" class="section add-form hidden">
      <div class="form-row">
        <label for="settingSite" class="form-label">Site</label>
        <select id="settingSite" class="select">
          <!-- Populated by JS -->
        </select>
      </div>
      <div class="form-row">
        <label for="settingAccount" class="form-label">Account</label>
        <input type="number" id="settingAccount" class="input input-sm" min="-1" max="9" value="0">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="saveSiteSettingBtn">Save</button>
        <button class="btn" id="cancelSiteSettingBtn">Cancel</button>
      </div>
    </div>

    <!-- Accounts -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Accounts</span>
        <div class="section-actions">
          <button class="btn btn-sm" id="detectBtn" title="Detect accounts">🔍 Detect</button>
          <button class="btn btn-sm" id="addAccountBtn" title="Add manually">+ Add</button>
        </div>
      </div>
      <div id="accountList" class="account-list">
        <!-- Populated by JS -->
        <div class="empty-state" id="emptyState">
          <span>No accounts yet. Click <b>Detect</b> to find them.</span>
        </div>
      </div>
    </div>

    <!-- Add Account Form (hidden) -->
    <div id="addAccountForm" class="section add-form hidden">
      <div class="form-row">
        <label for="newIndex" class="form-label">Index</label>
        <input type="number" id="newIndex" class="input input-sm" min="0" max="9" value="0">
      </div>
      <div class="form-row">
        <label for="newEmail" class="form-label">Email</label>
        <input type="email" id="newEmail" class="input" placeholder="user@gmail.com">
      </div>
      <div class="form-row">
        <label for="newLabel" class="form-label">Label</label>
        <input type="text" id="newLabel" class="input" placeholder="Work, Personal...">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="saveAccountBtn">Save</button>
        <button class="btn" id="cancelAccountBtn">Cancel</button>
      </div>
    </div>

    <!-- Global Default (collapsible, off by default) -->
    <div class="section global-section" id="globalSection">
      <div class="global-header" id="globalHeader">
        <span class="global-toggle-arrow" id="globalArrow">▸</span>
        <span class="section-title">Global Default</span>
        <span class="global-status" id="globalStatusBadge">off</span>
      </div>
      <div class="global-body hidden" id="globalBody">
        <div class="global-toggle-row">
          <label class="global-label" for="globalAccountToggle">Enable global default</label>
          <div class="toggle-wrap">
            <input type="checkbox" id="globalAccountToggle">
          </div>
        </div>
        <div class="global-account-row hidden" id="globalAccountRow">
          <label class="global-label" for="globalAccountSelect">Account</label>
          <select id="globalAccountSelect" class="select">
            <!-- Populated by JS -->
          </select>
        </div>
        <p class="global-hint">When enabled, all Google sites without a specific setting will use this account.</p>
      </div>
    </div>

    <!-- Mode (de-emphasized, at bottom) -->
    <div class="section mode-footer">
      <label for="modeSelect" class="label">Mode</label>
      <select id="modeSelect" class="select">
        <option value="proactive">Proactive (redirect bare URLs)</option>
        <option value="passive">Passive (rewrite only)</option>
      </select>
    </div>

    <!-- Status Bar -->
    <div id="statusBar" class="status-bar hidden"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
