<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Account Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">G-Account Switcher</h1>
      <div class="toggle-wrap">
        <input type="checkbox" id="enableToggle" checked>
        <label for="enableToggle" class="toggle-label"></label>
      </div>
    </header>

    <!-- Mode selector -->
    <div class="section mode-section">
      <label for="modeSelect" class="section-label">Mode</label>
      <select id="modeSelect" class="select">
        <option value="proactive">Proactive (force account on all URLs)</option>
        <option value="passive">Passive (rewrite only existing /u/ &amp; authuser=)</option>
      </select>
    </div>

    <!-- Default account -->
    <div class="section">
      <div class="section-header">
        <span class="section-label">Default Account</span>
        <button id="detectBtn" class="btn btn-sm btn-detect" title="Detect logged-in accounts">
          🔍 Detect
        </button>
      </div>
      <div id="accountList" class="account-list">
        <!-- Populated by JS -->
        <div class="empty-state" id="emptyState">
          <p>No accounts configured.</p>
          <p class="hint">Click "Detect" to auto-detect or add manually below.</p>
        </div>
      </div>
      <div class="add-account">
        <button id="addAccountBtn" class="btn btn-sm btn-add">+ Add Account</button>
      </div>
    </div>

    <!-- Add account form (hidden by default) -->
    <div id="addAccountForm" class="section add-form hidden">
      <div class="form-row">
        <label for="newIndex" class="form-label">Index</label>
        <input type="number" id="newIndex" class="input input-sm" min="0" max="9" value="0">
      </div>
      <div class="form-row">
        <label for="newEmail" class="form-label">Email</label>
        <input type="text" id="newEmail" class="input" placeholder="user@gmail.com">
      </div>
      <div class="form-row">
        <label for="newLabel" class="form-label">Label</label>
        <input type="text" id="newLabel" class="input" placeholder="Work, Personal, etc.">
      </div>
      <div class="form-actions">
        <button id="saveAccountBtn" class="btn btn-primary btn-sm">Save</button>
        <button id="cancelAccountBtn" class="btn btn-sm">Cancel</button>
      </div>
    </div>

    <!-- Per-site overrides -->
    <div class="section">
      <div class="section-header">
        <span class="section-label">Per-Site Overrides</span>
        <button id="addOverrideBtn" class="btn btn-sm btn-add">+ Add</button>
      </div>
      <div id="overrideList" class="override-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Add override form (hidden by default) -->
    <div id="addOverrideForm" class="section add-form hidden">
      <div class="form-row">
        <label for="overrideSite" class="form-label">Site</label>
        <select id="overrideSite" class="select">
          <!-- Populated by JS with available Google domains -->
        </select>
      </div>
      <div class="form-row">
        <label for="overrideAccount" class="form-label">Account</label>
        <input type="number" id="overrideAccount" class="input input-sm" min="0" max="9" value="0">
      </div>
      <div class="form-actions">
        <button id="saveOverrideBtn" class="btn btn-primary btn-sm">Save</button>
        <button id="cancelOverrideBtn" class="btn btn-sm">Cancel</button>
      </div>
    </div>

    <!-- Status bar -->
    <div id="statusBar" class="status-bar hidden"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
