<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>G-Account Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">G-Account Switcher</h1>
      <div class="toggle-wrap">
        <label class="toggle" for="enableToggle">
          <input type="checkbox" id="enableToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <!-- Mode -->
    <div class="section mode-section">
      <label for="modeSelect" class="label">Mode</label>
      <select id="modeSelect" class="select">
        <option value="proactive">Proactive (redirect bare URLs)</option>
        <option value="passive">Passive (rewrite only)</option>
      </select>
    </div>

    <!-- Quick Switch for current site -->
    <div class="section" id="quickSwitchSection" style="display:none">
      <div class="section-header">
        <span class="section-title">
          <span class="site-icon">🌐</span>
          <span id="currentSiteName">Current Site</span>
        </span>
      </div>
      <select id="quickSwitchSelect" class="select">
        <option value="">No override</option>
      </select>
    </div>

    <!-- Accounts -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Accounts</span>
        <div class="section-actions">
          <button class="btn btn-sm" id="detectBtn" title="Detect accounts">🔍 Detect</button>
          <button class="btn btn-sm" id="addAccountBtn" title="Add manually">+ Add</button>
        </div>
      </div>
      <div id="accountList" class="account-list">
        <!-- Populated by JS -->
        <div class="empty-state" id="emptyState">
          <span>No accounts yet. Click <b>Detect</b> to find them.</span>
        </div>
      </div>
    </div>

    <!-- Add Account Form (hidden) -->
    <div id="addAccountForm" class="section add-form hidden">
      <div class="form-row">
        <label for="newIndex" class="label">Index</label>
        <input type="number" id="newIndex" class="input" min="0" max="9" value="0">
      </div>
      <div class="form-row">
        <label for="newEmail" class="label">Email</label>
        <input type="email" id="newEmail" class="input" placeholder="user@gmail.com">
      </div>
      <div class="form-row">
        <label for="newLabel" class="label">Label</label>
        <input type="text" id="newLabel" class="input" placeholder="Work, Personal...">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="saveAccountBtn">Save</button>
        <button class="btn" id="cancelAccountBtn">Cancel</button>
      </div>
    </div>

    <!-- Site Overrides -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Site Overrides</span>
        <button class="btn btn-sm" id="addOverrideBtn" title="Add override">+ Add</button>
      </div>
      <div id="overrideList" class="override-list"></div>
    </div>

    <!-- Add Override Form (hidden) -->
    <div id="addOverrideForm" class="section add-form hidden">
      <div class="form-row">
        <label for="overrideSite" class="label">Site</label>
        <select id="overrideSite" class="select">
          <!-- Populated by JS -->
        </select>
      </div>
      <div class="form-row">
        <label for="overrideAccount" class="label">Account #</label>
        <input type="number" id="overrideAccount" class="input" min="0" max="9" value="0">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="saveOverrideBtn">Save</button>
        <button class="btn" id="cancelOverrideBtn">Cancel</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="statusBar" class="status-bar hidden"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
